name: Basic repository checks

on:
  push:
  pull_request:

jobs:
  basic-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect obvious secrets in committed files
        shell: bash
        run: |
          set -e
          if grep -RInE "(TELEGRAM_BOT_TOKEN=([0-9]+:)|password=|PRIVATE KEY|api[_-]?key|secret)" . \
            --exclude-dir=.git \
            --exclude=.env.example; then
            echo "Potential secret found. Review output above."
            exit 1
          fi

      - name: Validate YAML syntax
        shell: bash
        run: |
          python - <<'PY'
          import os
          import sys
          import yaml

          failed = False

          for root, _, files in os.walk("."):
              if ".git" in root:
                  continue

              for filename in files:
                  if filename.endswith((".yml", ".yaml")):
                      path = os.path.join(root, filename)

                      try:
                          with open(path, "r", encoding="utf-8") as handle:
                              list(yaml.safe_load_all(handle))
                          print(f"OK {path}")
                      except Exception as exc:
                          failed = True
                          print(f"FAIL {path}: {exc}")

          sys.exit(1 if failed else 0)
          PY
